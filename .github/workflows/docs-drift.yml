name: Docs drift

# Fails if a quickstart page cites a client-SDK symbol that no longer exists
# (#87). This repo hand-writes its SDK quickstarts as Erlang views, so nothing
# but CI notices when an SDK release in another repo removes a symbol a
# quickstart still calls.
#
# The error-table guard that used to live here was removed: the guest table now
# lives in asobi's guides/authentication.md (the site page is generated from it,
# ADR 0003), and asobi's own check-error-drift.sh verifies that table against
# the controller. Checking a generated copy here would duplicate the upstream
# guard.
on:
  push:
    paths:
      - 'src/views/asobi_site_docs_quickstart_*_view.erl'
      - 'scripts/check-quickstart-drift.sh'
      - '.github/workflows/docs-drift.yml'
  pull_request:
    paths:
      - 'src/views/asobi_site_docs_quickstart_*_view.erl'
      - 'scripts/check-quickstart-drift.sh'
      - '.github/workflows/docs-drift.yml'
  schedule:
    - cron: '0 6 * * 1'

jobs:
  drift:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Fetch client SDK repos
        run: |
          mkdir -p "$RUNNER_TEMP/sdks"
          for engine in godot unity defold; do
            git clone --depth 1 "https://github.com/widgrensit/asobi-$engine" \
              "$RUNNER_TEMP/sdks/asobi-$engine"
          done
      - name: Check quickstart-vs-SDK drift
        run: scripts/check-quickstart-drift.sh "$RUNNER_TEMP/sdks"
