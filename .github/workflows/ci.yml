name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v2.1.2
    permissions:
      contents: write
      pull-requests: write
    with:
      version-file: '.tool-versions'
      enable-audit: true
      # cowlib cookie-encoder LOW with no upstream fix above 2.16.1; not
      # applicable (no sessions/cookies on this site). See SECURITY.md.
      audit-ignores: 'GHSA-g2wm-735q-3f56'
      # SBOM temporarily disabled: rebar3_sbom fork crashes with
      # unicode:characters_to_binary badarg on this dep graph.
      # Follow-up: fix upstream in Taure/rebar3_sbom, then re-enable.
      enable-sbom: false
      enable-sbom-scan: false
      enable-dependency-submission: true
      enable-summary: true
      enable-elp-lint: true
      enable-ct: true
      enable-coverage: false
      enable-ex-doc: false
      enable-mutate: false
      enable-elp-eqwalize: false
    secrets: inherit
