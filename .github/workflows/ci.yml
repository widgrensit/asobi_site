name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v2.0.14
    permissions:
      contents: write
      pull-requests: write
    with:
      version-file: '.tool-versions'
      enable-audit: true
      # SBOM temporarily disabled: rebar3_sbom fork crashes with
      # unicode:characters_to_binary badarg on this dep graph.
      # Follow-up: fix upstream in Taure/rebar3_sbom, then re-enable.
      enable-sbom: false
      enable-sbom-scan: false
      enable-dependency-submission: true
      enable-summary: true
      enable-elp-lint: true
      enable-ct: true
      enable-coverage: false
      enable-ex-doc: false
      enable-mutate: false
      enable-elp-eqwalize: false
    secrets: inherit
